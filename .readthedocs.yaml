# Read the Docs configuration file
version: 2

# Enable offline formats
formats:
  - htmlzip
  - pdf

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    post_build:
      # Replace the default HTMLZip artifact with a zip of the normal multi-page HTML build
      - mkdir -p _readthedocs/htmlzip
      - rm -rf _readthedocs/$READTHEDOCS_PROJECT
      - rm -f _readthedocs/htmlzip/$READTHEDOCS_PROJECT.zip
      - cp -r _readthedocs/html _readthedocs/$READTHEDOCS_PROJECT
      - cd _readthedocs && zip -r htmlzip/$READTHEDOCS_PROJECT.zip $READTHEDOCS_PROJECT

sphinx:
  configuration: docs/source/conf.py
  builder: html

python:
  install:
    - requirements: docs/requirements.txt